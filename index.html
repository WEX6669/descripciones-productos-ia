<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de descripciones de productos con IA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 600px;
      border: 1px solid #e5e5e2;
    }

    h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 1.5rem; }

    label { font-size: 13px; color: #666; display: block; margin-bottom: 6px; }

    input[type="text"], textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      background: #fafafa;
      color: #1a1a18;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: #3b82f6;
      background: #fff;
    }

    textarea { min-height: 80px; resize: vertical; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .row2 { grid-template-columns: 1fr; } }

    .field { margin-bottom: 1rem; }
    .divider { border: none; border-top: 1px solid #eee; margin: 1.25rem 0; }

    .pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
    .pill {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid #ddd;
      font-size: 13px;
      cursor: pointer;
      background: #fff;
      color: #666;
      transition: all 0.15s;
    }
    .pill.active { background: #eff6ff; color: #2563eb; border-color: #93c5fd; }
    .pill:hover:not(.active) { background: #f5f5f3; }

    .section-label { font-size: 13px; color: #666; margin: 1rem 0 6px; display: block; }

    .btn {
      width: 100%;
      padding: 11px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .result {
      margin-top: 1.5rem;
      background: #f8faff;
      border: 1px solid #dbeafe;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      display: none;
    }

    .result-label {
      font-size: 12px;
      color: #93c5fd;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .result-text {
      font-size: 15px;
      line-height: 1.7;
      color: #1a1a18;
      margin-bottom: 12px;
      white-space: pre-wrap;
    }

    .copy-btn {
      font-size: 13px;
      color: #2563eb;
      background: none;
      border: 1px solid #93c5fd;
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
    }
    .copy-btn:hover { background: #eff6ff; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #ffffff44;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Describe tus productos con IA</h1>
    <p class="subtitle">Rellena los datos y genera una descripción lista para tu tienda o redes sociales.</p>

    <div class="row2">
      <div class="field">
        <label for="prod-name">Nombre del producto</label>
        <input type="text" id="prod-name" placeholder="Ej: Camiseta de lino azul">
      </div>
      <div class="field">
        <label for="prod-price">Precio (opcional)</label>
        <input type="text" id="prod-price" placeholder="Ej: 29,99€">
      </div>
    </div>

    <div class="field">
      <label for="prod-features">Características principales</label>
      <textarea id="prod-features" placeholder="Ej: 100% lino, lavable a máquina, tallas S-XXL, 3 colores"></textarea>
    </div>

    <div class="field">
      <label for="prod-audience">¿A quién va dirigido? (opcional)</label>
      <input type="text" id="prod-audience" placeholder="Ej: Mujeres de 25-40 años que buscan ropa cómoda">
    </div>

    <hr class="divider">

    <span class="section-label">Plataforma de destino</span>
    <div class="pills" id="platform-row">
      <button class="pill active" data-val="tienda online">Tienda online</button>
      <button class="pill" data-val="Instagram">Instagram</button>
      <button class="pill" data-val="Amazon">Amazon</button>
      <button class="pill" data-val="Wallapop">Wallapop</button>
    </div>

    <span class="section-label">Tono</span>
    <div class="pills" id="tone-row">
      <button class="pill active" data-val="profesional y atractivo">Profesional</button>
      <button class="pill" data-val="cercano e informal">Cercano</button>
      <button class="pill" data-val="lujoso y exclusivo">Premium</button>
    </div>

    <button class="btn" id="gen-btn" onclick="generate()">✨ Generar descripción</button>

    <div class="result" id="result-box">
      <p class="result-label">Descripción generada</p>
      <p class="result-text" id="result-text"></p>
      <button class="copy-btn" onclick="copyText()">📋 Copiar</button>
    </div>
  </div>

  <script>
    let platform = 'tienda online';
    let tone = 'profesional y atractivo';
    const API_KEY = 'TU_API_KEY_AQUI';

    document.getElementById('platform-row').addEventListener('click', e => {
      const pill = e.target.closest('.pill');
      if (!pill) return;
      document.querySelectorAll('#platform-row .pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      platform = pill.dataset.val;
    });

    document.getElementById('tone-row').addEventListener('click', e => {
      const pill = e.target.closest('.pill');
      if (!pill) return;
      document.querySelectorAll('#tone-row .pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      tone = pill.dataset.val;
    });

    async function generate() {
      const name = document.getElementById('prod-name').value.trim();
      const features = document.getElementById('prod-features').value.trim();
      const price = document.getElementById('prod-price').value.trim();
      const audience = document.getElementById('prod-audience').value.trim();
      if (!name) { alert('Escribe el nombre del producto primero.'); return; }

      const btn = document.getElementById('gen-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Generando...';
      document.getElementById('result-box').style.display = 'none';

      const prompt = `Eres un copywriter experto en e-commerce. Escribe una descripción de producto para ${platform} con tono ${tone}.

Producto: ${name}
${features ? `Características: ${features}` : ''}
${price ? `Precio: ${price}` : ''}
${audience ? `Público objetivo: ${audience}` : ''}

La descripción debe:
- Adaptarse al formato de ${platform}
- Destacar los beneficios, no solo las características
- Tener un gancho inicial potente
- Incluir una llamada a la acción al final
- Ser natural y persuasiva, no robótica
- Tener entre 80 y 150 palabras

Responde solo con la descripción, sin explicaciones ni comillas.`;

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': API_KEY,
            'anthropic-version': '2023-06-01'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 1000,
            messages: [{ role: 'user', content: prompt }]
          })
        });
        const data = await res.json();
        const text = data.content?.[0]?.text || 'Error al generar la descripción.';
        document.getElementById('result-text').textContent = text;
        document.getElementById('result-box').style.display = 'block';
      } catch (err) {
        alert('Error de conexión. Inténtalo de nuevo.');
      }

      btn.disabled = false;
      btn.innerHTML = '✨ Generar descripción';
    }

    function copyText() {
      const text = document.getElementById('result-text').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = '✅ Copiado';
        setTimeout(() => { btn.textContent = '📋 Copiar'; }, 1800);
      });
    }
  </script>
</body>
</html>
